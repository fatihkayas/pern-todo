name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  # ── Backend: type-check, lint, tests ──────────────────────
  backend:
    name: Backend — Type-check, Lint & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint "**/*.ts" --max-warnings 0

      - name: Tests & coverage
        run: npm run test:coverage
        env:
          NODE_ENV: test
          STRIPE_SECRET_KEY: sk_test_fakekeyfortestingonly00000000
          STRIPE_WEBHOOK_SECRET: whsec_fakesecretfortestingonly000000

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: server/coverage/lcov-report/
          retention-days: 7

  # ── Frontend: type-check + production build ───────────────
  frontend:
    name: Frontend — Type-check & Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: client

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          CI: false

  # ── Go: build & vet integration-service ──────────────────
  go-build:
    name: Go — Build & Vet
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: integration-service/go.sum

      - name: Build integration-service
        run: cd integration-service && go build ./...

      - name: Vet
        run: cd integration-service && go vet ./...

  # ── Docker: build & push to GHCR (main only) ─────────────
  docker:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/seiko-backend:latest
            ghcr.io/${{ github.repository_owner }}/seiko-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./client
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/seiko-frontend:latest
            ghcr.io/${{ github.repository_owner }}/seiko-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── AWS: push to ECR + force new ECS deployment (main only) ─────
  deploy-aws:
    name: Deploy to AWS
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      id-token: write   # Required for OIDC login to AWS

    steps:
      - name: Configure AWS credentials (OIDC — no stored keys)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Login to GHCR (to pull built images)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Retag GHCR images → ECR and push
        run: |
          SHA=${{ github.sha }}
          ECR=${{ steps.login-ecr.outputs.registry }}
          OWNER=${{ github.repository_owner }}

          for SVC in seiko-backend seiko-frontend; do
            docker pull ghcr.io/${OWNER}/${SVC}:${SHA}
            docker tag  ghcr.io/${OWNER}/${SVC}:${SHA} ${ECR}/${SVC}:${SHA}
            docker tag  ghcr.io/${OWNER}/${SVC}:${SHA} ${ECR}/${SVC}:latest
            docker push ${ECR}/${SVC}:${SHA}
            docker push ${ECR}/${SVC}:latest
          done

      - name: Force new ECS deployment (backend + frontend)
        run: |
          CLUSTER=seiko-cluster
          aws ecs update-service --cluster ${CLUSTER} --service seiko-backend  --force-new-deployment
          aws ecs update-service --cluster ${CLUSTER} --service seiko-frontend --force-new-deployment

  # ── Azure: push to ACR + deploy to Container Apps (main only) ──
  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      id-token: write   # Required for OIDC login to Azure

    steps:
      - name: Azure Login (OIDC — no stored credentials)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Login to GHCR (to pull built images)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Retag GHCR images → ACR and push
        run: |
          SHA=${{ github.sha }}
          ACR=${{ secrets.ACR_LOGIN_SERVER }}
          OWNER=${{ github.repository_owner }}

          for SVC in seiko-backend seiko-frontend; do
            docker pull ghcr.io/${OWNER}/${SVC}:${SHA}
            docker tag  ghcr.io/${OWNER}/${SVC}:${SHA} ${ACR}/${SVC}:${SHA}
            docker tag  ghcr.io/${OWNER}/${SVC}:${SHA} ${ACR}/${SVC}:latest
            docker push ${ACR}/${SVC}:${SHA}
            docker push ${ACR}/${SVC}:latest
          done

      - name: Update backend Container App
        run: |
          az containerapp update \
            --name seiko-backend \
            --resource-group seiko-rg \
            --image ${{ secrets.ACR_LOGIN_SERVER }}/seiko-backend:${{ github.sha }}

      - name: Update frontend Container App
        run: |
          az containerapp update \
            --name seiko-frontend \
            --resource-group seiko-rg \
            --image ${{ secrets.ACR_LOGIN_SERVER }}/seiko-frontend:${{ github.sha }}

  # ── GCP: push to Artifact Registry + deploy to Cloud Run (main only) ──────────
  deploy-gcp:
    name: Deploy — GCP Cloud Run
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      id-token: write   # Required for OIDC login to GCP

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (OIDC — no stored keys)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ secrets.GCP_AR_HOSTNAME }} --quiet

      - name: Login to GHCR (to pull built images)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Retag GHCR images → Artifact Registry and push
        run: |
          AR="${{ secrets.GCP_AR_HOSTNAME }}/${{ secrets.GCP_PROJECT_ID }}/seiko"
          SHA="${{ github.sha }}"
          OWNER="${{ github.repository_owner }}"

          for SVC in seiko-backend seiko-frontend; do
            docker pull ghcr.io/${OWNER}/${SVC}:${SHA}
            docker tag  ghcr.io/${OWNER}/${SVC}:${SHA} ${AR}/${SVC}:${SHA}
            docker tag  ghcr.io/${OWNER}/${SVC}:${SHA} ${AR}/${SVC}:latest
            docker push ${AR}/${SVC}:${SHA}
            docker push ${AR}/${SVC}:latest
          done

      - name: Deploy to Cloud Run
        run: |
          AR="${{ secrets.GCP_AR_HOSTNAME }}/${{ secrets.GCP_PROJECT_ID }}/seiko"
          SHA="${{ github.sha }}"
          gcloud run deploy seiko-backend \
            --image ${AR}/seiko-backend:${SHA} \
            --region ${{ secrets.GCP_REGION }} \
            --quiet
          gcloud run deploy seiko-frontend \
            --image ${AR}/seiko-frontend:${SHA} \
            --region ${{ secrets.GCP_REGION }} \
            --quiet

  # ── Summary ───────────────────────────────────────────────
  summary:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    needs: [backend, frontend, go-build, docker, deploy-aws, deploy-gcp]
    if: always()

    steps:
      - name: Write summary
        run: |
          echo "## CI Results" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend | ${{ needs.backend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | ${{ needs.frontend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Go Build | ${{ needs.go-build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker | ${{ needs.docker.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy AWS | ${{ needs.deploy-aws.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy GCP | ${{ needs.deploy-gcp.result }} |" >> $GITHUB_STEP_SUMMARY
