global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - seiko-alertmanager:9093

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: seiko-backend
    static_configs:
      - targets:
          - seiko-backend:8080
    metrics_path: /metrics

  - job_name: integration-service
    static_configs:
      - targets:
          - integration-service:8080
    metrics_path: /metrics

  - job_name: alertmanager
    static_configs:
      - targets:
          - seiko-alertmanager:9093
