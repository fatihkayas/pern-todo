services:
  nginx:
    image: nginx:alpine
    container_name: seiko_nginx
    restart: unless-stopped
    mem_limit: 64m
    cpus: 0.25
    ports:
      - "8090:80"
      - "8443:443"
      - "5443:5443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./client/build:/app/build:ro
    depends_on:
      - frontend
      - backend

  db:
    image: postgres:15-alpine
    container_name: seiko_db
    restart: unless-stopped
    mem_limit: 512m
    cpus: 0.50
    environment:
      POSTGRES_DB: jwtauth
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: your_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d jwtauth"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: keycloak_server
    restart: unless-stopped
    mem_limit: 768m
    cpus: 0.50
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    volumes:
      - ./keycloak-realm.json:/opt/keycloak/data/import/realm.json:ro
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  ollama:
    image: ollama/ollama:latest
    container_name: seiko_ollama
    restart: unless-stopped
    mem_limit: 2g
    cpus: 1.00
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  backend:
    image: localhost/seiko-backend:latest
    container_name: seiko_backend
    restart: unless-stopped
    mem_limit: 512m
    cpus: 0.50
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_started
    ports:
      - "5001:5000"
    environment:
      PORT: "5000"
      DB_USER: postgres
      DB_PASSWORD: your_password
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: jwtauth
      OLLAMA_URL: http://seiko_ollama:11434
      OLLAMA_MODEL: llama3.2
      KAFKA_BROKER: seiko_redpanda:9092
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:5000/ready', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  frontend:
    image: localhost/seiko-frontend:latest
    container_name: seiko_frontend
    restart: unless-stopped
    mem_limit: 128m
    cpus: 0.25
    depends_on:
      - backend
      - keycloak
    ports:
      - "3000:8080"
    environment:
      BROWSER: none
      CHOKIDAR_USEPOLLING: true
      REACT_APP_BACKEND_URL: http://seiko_backend:5000
      DANGEROUSLY_DISABLE_HOST_CHECK: "true"

  adminer:
    image: adminer
    container_name: seiko_adminer
    restart: unless-stopped
    mem_limit: 64m
    cpus: 0.10
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8082:8080"
    environment:
      ADMINER_DEFAULT_SERVER: db

  prometheus:
    image: prom/prometheus:latest
    container_name: seiko_prometheus
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.25
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--web.enable-lifecycle"
    depends_on:
      - backend

  alertmanager:
    image: prom/alertmanager:latest
    container_name: seiko_alertmanager
    restart: unless-stopped
    mem_limit: 64m
    cpus: 0.10
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    depends_on:
      - prometheus

  grafana:
    image: grafana/grafana:latest
    container_name: seiko_grafana
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.25
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    depends_on:
      - prometheus

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v23.3.21
    container_name: seiko_redpanda
    restart: unless-stopped
    mem_limit: 768m
    cpus: 0.50
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 512M
      - --reserve-memory
      - 0M
      - --node-id
      - "0"
      - --kafka-addr
      - internal://0.0.0.0:9092,external://0.0.0.0:29092
      - --advertise-kafka-addr
      - internal://seiko_redpanda:9092,external://localhost:29092
      - --check=false
    ports:
      - "29092:29092"

  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:latest
    container_name: seiko_redpanda_console
    restart: unless-stopped
    mem_limit: 128m
    cpus: 0.10
    depends_on:
      - redpanda
    ports:
      - "8084:8080"
    environment:
      KAFKA_BROKERS: seiko_redpanda:9092

  redpanda-init:
    image: docker.redpanda.com/redpandadata/redpanda:v23.3.21
    container_name: seiko_redpanda_init
    mem_limit: 64m
    cpus: 0.10
    depends_on:
      - redpanda
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        sleep 5 &&
        rpk --brokers seiko_redpanda:9092 topic create orders.created --partitions 1 --replicas 1 || true
    restart: "no"

  integration-service:
    image: localhost/seiko-integration:latest
    container_name: seiko_integration
    restart: unless-stopped
    mem_limit: 128m
    cpus: 0.25
    depends_on:
      - redpanda
      - db
    ports:
      - "8083:8080"
    environment:
      KAFKA_BROKER: seiko_redpanda:9092
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: your_password
      DB_DATABASE: jwtauth

volumes:
  postgres_data:
  ollama_data:
  prometheus_data:
  grafana_data:
  alertmanager_data:
